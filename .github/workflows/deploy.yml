name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar Dependencias 🧹
        run: npm install

      - name: Construir Proyecto (Solución Directa) 🏗️
        run: |
          # Usamos node para ejecutar el archivo JS de vite directamente
          # Esto evita el error de "Permission denied"
          node ./node_modules/vite/bin/vite.js build

      - name: Desplegar a GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages