name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # ESTO ELIMINA EL AVISO DE DEPRECACIÓN:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Configurar Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Tu código sigue usando la 22, que es estable
          cache: 'npm'

      - name: Instalar y Construir 🏗️
        run: |
          npm install
          npm run build

      - name: Desplegar a GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages