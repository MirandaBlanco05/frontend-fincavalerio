name: Deploy Frontend

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Node 
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalacion 
        run: npm install

      - name: Build Forzado (Modo Directo) 
        # Aquí está el truco: llamamos al archivo JS directamente, no al binario "vite"
        run: node ./node_modules/vite/bin/vite.js build

      - name: Upload Artifact 
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages 
        id: deployment
        uses: actions/deploy-pages@v4